# ============================================================
# DVC PIPELINE
# ------------------------------------------------------------
# PURPOSE:
# Defines the reproducible machine learning workflow.
#
# DVC will:
# 1. Execute the training pipeline.
# 2. Track dependencies that trigger retraining.
# 3. Version generated outputs (models and artifacts).
# 4. Enable full pipeline reproduction through:
#
#       dvc repro
#
# CURRENT STAGES:
# ------------------------------------------------------------
# train
#   └── Runs src.training.train
#       Produces:
#       - models/
#       - artifacts/
#
# FUTURE STAGES:
# ------------------------------------------------------------
# rank
#   └── Runs model_ranker.py
#       Produces:
#       - artifacts/champion.json
#
# DESIGN PRINCIPLES:
# ------------------------------------------------------------
# - Reproducibility
# - Traceability
# - Deterministic outputs
# - MLOps compatibility
# ============================================================

stages:

  # ==========================================================
  # TRAINING STAGE
  # ----------------------------------------------------------
  # Executes the complete training pipeline:
  # - Build vocabulary
  # - Load datasets
  # - Train all architectures
  # - Save models
  # - Save metrics and metadata
  # ==========================================================
  train:

    # Command executed by DVC
    cmd: python -m src.training.train

    # Files/folders that, when modified,
    # invalidate this stage and trigger retraining
    deps:
      - src/training/train.py
      - src/data
      - src/features
      - src/models
      - config/config.yaml

    # Outputs generated by this stage
    outs:
      - models
      - artifacts

  # ==========================================================
  # MODEL RANKING STAGE
  # ----------------------------------------------------------
  # Executes champion selection using MLflow runs.
  #
  # Responsibilities:
  # - Load experiment runs from mlflow.db
  # - Compute the leaderboard
  # - Select the best model according to PRIMARY_METRIC
  # - Persist artifacts/champion.json
  #
  # This stage depends on:
  # - The ranking logic
  # - The MLflow database generated during training
  #
  # Output:
  # - artifacts/champion.json
  # ==========================================================
  rank:

    # Command executed by DVC
    cmd: python -m src.tracking.model_ranker

    # Dependencies that trigger reranking
    deps:
      - src/tracking/model_ranker.py
      - mlflow.db

    # Outputs produced by this stage
    outs:
      - artifacts/champion.json