# ============================================================
# GITHUB ACTIONS - CONTINUOUS INTEGRATION PIPELINE
# ------------------------------------------------------------
# PURPOSE:
# Automatically validate code quality on every push and
# pull request to the main branch.
#
# QUALITY GATES:
# 1. Install project dependencies
# 2. Install package in editable mode (pip install -e .)
# 3. Run unit tests with Pytest
# 4. Run static analysis with Ruff
# 5. Verify code formatting with Black
#
# IMPORTANT:
# requirements.txt is the OFFICIAL dependency file.
#
# req.txt remains a PERSONAL file for local development
# convenience and MUST NOT be used by:
# - GitHub Actions
# - Docker
# - Cloud environments
# - Other developers
#
# FUTURE EXTENSIONS:
# - Docker image builds
# - DVC checks
# - Airflow validation
# - AWS deployment workflows
# - Azure deployment workflows
# - GCP deployment workflows
# ============================================================

name: CI

# ============================================================
# TRIGGERS
# ------------------------------------------------------------
# Execute this workflow whenever code is pushed or a PR is
# opened against the main branch.
# ============================================================

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  # ==========================================================
  # MAIN VALIDATION JOB
  # ==========================================================
  test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:
          - "3.10"


    steps:

      # ======================================================
      # STEP 1: DOWNLOAD REPOSITORY
      # ======================================================
      - name: Checkout repository
        uses: actions/checkout@v4


      # ======================================================
      # STEP 2: INSTALL PYTHON
      # ======================================================
      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: ${{ matrix.python-version }}


      # ======================================================
      # STEP 3: INSTALL DEPENDENCIES
      # ------------------------------------------------------
      # OFFICIAL INSTALLATION PATH:
      #
      # requirements.txt
      # + editable project installation
      #
      # setup.py is required for:
      #
      #     pip install -e .
      #
      # This reproduces exactly the local development
      # environment.
      # ======================================================
      - name: Install dependencies

        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .


      # ======================================================
      # STEP 4: UNIT TESTS
      # ------------------------------------------------------
      # Prevent regressions and verify expected behavior.
      # ======================================================
      - name: Run tests

        run: |
          pytest -v


      # ======================================================
      # STEP 5: STATIC ANALYSIS
      # ------------------------------------------------------
      # Detect:
      # - unused imports
      # - style issues
      # - potential bugs
      # - maintainability problems
      # ======================================================
      - name: Run Ruff

        run: |
          ruff check .


      # ======================================================
      # STEP 6: FORMAT VALIDATION
      # ------------------------------------------------------
      # Black enforces a single formatting style.
      #
      # --check:
      # Fail if code is not correctly formatted.
      # ======================================================
      - name: Run Black

        run: |
          black . --check