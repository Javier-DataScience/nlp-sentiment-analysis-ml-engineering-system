# ============================================================
# DVC PIPELINE (UPDATED CLEAN VERSION)
# ------------------------------------------------------------
# PURPOSE:
# This file defines the full reproducible ML pipeline using DVC.
#
# PIPELINE FLOW:
#
#   train  →  rank
#
# DESIGN DECISIONS:
# ------------------------------------------------------------
# 1. "train" owns ALL outputs:
#    - models/
#    - artifacts/ (including champion.json, metrics, vocab, etc.)
#
# 2. "rank" does NOT declare outputs:
#    - It only updates artifacts internally.
#    - Avoids DVC directory/file overlap conflicts.
#
# 3. Ensures reproducibility via:
#    dvc repro
#
# ------------------------------------------------------------
# WHY THIS DESIGN:
# ------------------------------------------------------------
# DVC does NOT allow:
#   - a directory tracked in one stage
#   - and a file inside it tracked in another stage
#
# So we centralize outputs under "train".
# ============================================================

stages:

  # ==========================================================
  # TRAIN STAGE
  # ----------------------------------------------------------
  # Responsibilities:
  # - Build vocabulary
  # - Load dataset
  # - Train all models (baseline, LSTM, GRU, CNN, BiLSTM)
  # - Save models to models/
  # - Save artifacts to artifacts/
  # ==========================================================
  train:

    cmd: python -m src.training.train

    deps:
      - src/training/train.py
      - src/data
      - src/features
      - src/models
      - config/config.yaml

    outs:
      - models
      - artifacts


  # ==========================================================
  # RANK STAGE
  # ----------------------------------------------------------
  # Responsibilities:
  # - Read MLflow runs
  # - Compute leaderboard
  # - Select champion model
  # - Update artifacts/champion.json
  #
  # NOTE:
  # No "outs" defined because artifacts/ is already
  # fully managed by the train stage.
  # ==========================================================
  rank:

    cmd: python -m src.tracking.model_ranker

    deps:
      - src/tracking/model_ranker.py
      - mlflow.db